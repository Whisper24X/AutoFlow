<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易超级玛丽</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      padding: 16px;
    }
    h1 { margin: 0 0 8px; font-size: 1.25rem; }
    #status { margin-bottom: 8px; min-height: 1.5em; color: #94a3b8; font-size: 0.9rem; }
    #game {
      background: #000;
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      max-width: 100%;
      height: auto;
    }
    .hint { margin-top: 10px; font-size: 0.85rem; color: #64748b; }
  </style>
</head>
<body>
  <h1>简易超级玛丽 · Canvas Demo</h1>
  <p id="status"></p>
  <canvas id="game" width="960" height="540" aria-label="游戏画布"></canvas>
  <p class="hint">操作：← → 或 A D 移动，空格 / ↑ / W 跳跃，R 重开。踩怪头顶可消灭蘑菇怪。</p>
  <script src="./game.js"></script>
</body>
</html>
