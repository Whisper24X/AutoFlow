<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ops Admin Lab - User Detail</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body data-page="user-detail">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="sidebar-badge">Playwright Ready</span>
          <h1>Ops Admin Lab</h1>
        </div>
        <nav class="sidebar-nav">
          <span class="sidebar-section-label">Workspace</span>
          <a class="nav-link" data-nav="dashboard" href="/">仪表盘</a>
          <a class="nav-link" data-nav="users" href="/users.html">用户中心</a>
          <a class="nav-link" data-nav="orders" href="/orders.html">订单中心</a>
          <a class="nav-link" data-nav="reviews" href="/reviews.html">审核工作台</a>
        </nav>
        <div class="sidebar-footer">
          <span class="sidebar-footer-label">Environment</span>
          <strong>Local Mock Workspace</strong>
        </div>
      </aside>
      <main class="content">
        <div class="content-shell">
        <div class="page-header">
          <div>
            <span class="page-eyebrow">User Detail</span>
            <h2 data-testid="user-detail-name">用户详情</h2>
            <p>展示用户风险、观察状态与最近订单。</p>
          </div>
          <div class="page-actions">
            <div class="page-badges">
              <span class="soft-badge">Risk insight</span>
              <span class="soft-badge">Recent orders</span>
            </div>
            <a class="button-link button-secondary" href="/users.html">返回用户列表</a>
          </div>
        </div>
        <div class="flash" data-testid="global-error"></div>
        <section class="grid detail-stack">
          <article class="panel">
            <h3>用户画像</h3>
            <p class="panel-subtitle">快速识别用户当前状态、风险级别和观察名单变化。</p>
            <div class="meta-list" data-testid="user-meta"></div>
            <div class="detail-actions">
              <div class="detail-metric">状态：<span data-testid="user-detail-status"></span></div>
              <div class="detail-metric">风险：<span data-testid="user-detail-risk"></span></div>
              <div class="detail-metric">观察名单：<strong data-testid="user-watchlist-state"></strong></div>
            </div>
            <p class="note-card" data-testid="user-detail-notes"></p>
            <div class="detail-actions">
              <button data-testid="toggle-watchlist">加入观察名单</button>
            </div>
            <div class="flash" data-testid="user-flash"></div>
          </article>
          <article class="panel">
            <h3>最近订单</h3>
            <p class="panel-subtitle">帮助从用户上下文进入订单详情，验证多层跳转链路。</p>
            <div class="table-shell compact">
              <table>
                <thead>
                  <tr>
                    <th>订单号</th>
                    <th>用户</th>
                    <th>状态</th>
                    <th>金额</th>
                    <th>异常</th>
                    <th>创建时间</th>
                  </tr>
                </thead>
                <tbody data-testid="user-orders-body"></tbody>
              </table>
            </div>
          </article>
        </section>
        </div>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
  </html>
